services:

  # ─── Backend Flask ───────────────────────────────────────────────
  jamali-flask:
    build: .
    image: jamali-flask-app
    container_name: jamali-flask
    restart: unless-stopped
    env_file: .env
    networks:
      - jamali-net
    depends_on:
      jamali-mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3

  # ─── MongoDB ─────────────────────────────────────────────────────
  jamali-mongo:
    image: mongo:7.0
    container_name: jamali-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: jamali_db
    volumes:
      - jamali-mongo-data:/data/db
      - ./mongo-seed:/docker-entrypoint-initdb.d:ro
    networks:
      - jamali-net
    # Pas exposé publiquement : accès uniquement via le réseau interne
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval 'db.adminCommand({ping:1})' -u root -p $$MONGO_INITDB_ROOT_PASSWORD --authenticationDatabase admin || exit 1"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5

  # ─── Nginx (frontend + proxy) ─────────────────────────────────────
  jamali-nginx:
    image: nginx:alpine
    container_name: jamali-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx/jamali.conf:/etc/nginx/conf.d/default.conf:ro
      - ./index.html:/usr/share/nginx/html/index.html:ro
      - ./admin.html:/usr/share/nginx/html/admin.html:ro
      - ./logo.svg:/usr/share/nginx/html/logo.svg:ro
    networks:
      - jamali-net
    depends_on:
      - jamali-flask
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  jamali-net:
    name: jamali-net

volumes:
  jamali-mongo-data:
    name: jamali-mongo-data
